/*
se requieren numeros de 8 a 13 digitos
rellenan por la izquierda de ceros
hasta tener un numero de 8 a 13 
*/

var i=0;
var ceros='0000000000000';  // 14 ceros
d1=entrada[i];  // primero
while(d1!='0'){	
	if (d1.length<8){
		d1=ceros.substr(0,8-d1.length)+d1;
	}else if (d1.length<13 && d1.length>8){
		d1=ceros.substr(0,13-d1.length)+d1;
	}	
	entrada[i]=d1;
	i++;
	d1=entrada[i]; 
}

/* calculo */

document.write("<b>salida</b><br/>");
i=0;

while(d1!='0'){	
	// calculo código de contol 
	var acumulador=0;
	var factor=3;
	// recorrer hacia atras
	for (j=d1.length-2;j>-1;j--){
		// suma acumulada
		acumulador+=factor*parseInt(d1[j]);
		// alternancia entre par / impar		
		if (factor==3){factor=1;}else{factor=3;} 
	}
	var resul;
	if (acumulador%10==0){ // módulo , resto entero
		resul=0;
	}else{
		// unidades hasta siguiente 10
		resul=(Math.trunc(acumulador/10)+1)*10-acumulador; 
	}
	console.log(d1,' dc:',resul);

	if(resul==d1[d1.length-1]){ok='SI';}else{ok='NO';}
