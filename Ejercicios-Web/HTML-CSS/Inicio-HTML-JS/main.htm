<script>
    function generarValores() {
        
        const alto = Math.floor(Math.random() * 10) + 1;
        const ancho = Math.floor(Math.random() * 10) + 1;
        const fondo = Math.floor(Math.random() * 10) + 1;

        const superficie = alto * ancho;
        const volumen = alto * ancho * fondo;

        const volumenEnPies = Math.floor(volumen * 3.281);

        return `Alto=${alto} Ancho=${ancho} Fondo=${fondo} Superficie=${superficie} Volumen=${volumen} Volumen en pies=${volumenEnPies}<br>`;
    }

    for (let i = 0; i < 10; i++) {
        document.write(generarValores());
    }
</script>
