    // Usando ChatGPT con el prompt: "Crea una función en JavaScript que sume, reste o multiplique dos números y muestre el resultado por pantalla usando write".

    function calcular(num1, num2, operador) {
        switch (operador) {
            case '+':
                return num1 + num2;
            case '-':
                return num1 - num2;
            case '*':
                return num1 * num2;
            default:
                return 'Operador no válido. Usa +, - o *';
        }
    }

    // Mostrar los resultados usando document.write para que sea visible en la página
    document.write("Resultado de la suma: " + calcular(5, 3, '+') + "<br>"); // Muestra: 8
    document.write("Resultado de la resta: " + calcular(5, 3, '-') + "<br>"); // Muestra: 2
    document.write("Resultado de la multiplicación: " + calcular(5, 3, '*') + "<br>"); // Muestra: 15
    document.write("Resultado de operador no válido: " + calcular(5, 3, '/') + "<br>"); // Muestra: Operador no válido. Usa +, - o *

    function calculate(num1, num2, operator) {

            case '-':
                return num1 - num2;
            case '*':
                return num1 * num2;
            default:
                return 'Invalid operator. Use +, -, or *';
        }
    }

    // Mostrar los resultados usando document.write
    document.write("Result of addition: " + calculate(10, 5, '+') + "<br>"); // Output: 15
